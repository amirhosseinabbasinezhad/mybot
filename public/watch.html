<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>پخش فیلم</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    background: #000;
    color: #fff;
    font-family: "Vazirmatn", Tahoma, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .player-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #player {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  .controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 20px 30px;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
    transition: opacity 0.4s ease, transform 0.4s ease;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    z-index: 10;
  }

  .controls.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .progress-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    direction: ltr;
  }

  .time-current,
  .time-duration {
    font-size: 12px;
    color: #aaa;
    min-width: 45px;
    font-variant-numeric: tabular-nums;
    direction: ltr;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    transition: height 0.2s;
    direction: ltr;
  }

  .progress-bar:hover {
    height: 6px;
  }

  .progress-fill {
    height: 100%;
    background: #e0a94a;
    border-radius: 2px;
    width: 0%;
    position: relative;
  }

  .progress-buffer {
    height: 100%;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    position: absolute;
    top: 0;
    left: 0;
    width: 0%;
  }

  .progress-dot {
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: #e0a94a;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .progress-bar:hover .progress-dot {
    opacity: 1;
  }

  .buttons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    direction: ltr;
  }

  .btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.1);
  }

  .btn:active {
    transform: scale(0.92);
  }

  .btn-play {
    font-size: 32px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    padding: 0;
  }

  .btn-play:hover {
    background: rgba(255,255,255,0.15);
  }

  .btn-skip svg {
    width: 28px;
    height: 28px;
    fill: white;
  }

  .download-info {
    position: absolute;
    top: 70px;
    right: 20px;
    color: #aaa;
    font-size: 12px;
    z-index: 5;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 6px;
    direction: ltr;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .download-info .label {
    color: #666;
    font-size: 10px;
    margin-right: 4px;
  }

  .center-status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: #aaa;
    pointer-events: none;
  }

  .center-status.hidden {
    display: none;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 3px solid rgba(224,169,74,0.15);
    border-top-color: #e0a94a;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .center-status .loading-text {
    font-size: 14px;
    color: #888;
  }

  .error-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 20;
    padding: 30px;
    text-align: center;
  }

  .error-overlay.show {
    display: flex;
  }

  .error-overlay h3 {
    color: #ff6b6b;
    font-size: 20px;
    margin-bottom: 10px;
  }

  .error-overlay p {
    color: #aaa;
    font-size: 15px;
    max-width: 360px;
    line-height: 1.8;
  }

  .error-overlay .btn-retry {
    margin-top: 20px;
    background: #e0a94a;
    color: #000;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  .error-overlay .btn-retry:hover {
    background: #f0b95a;
  }

  .error-overlay a {
    color: #e0a94a;
    text-decoration: none;
    margin-top: 12px;
  }

  .topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    z-index: 5;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .topbar a {
    pointer-events: auto;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    opacity: 0.7;
  }

  .topbar a:hover {
    opacity: 1;
  }

  .topbar .film-name {
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 80%;
  }

  @media (max-width: 600px) {
    .controls {
      padding: 12px 12px 20px;
    }
    .btn {
      font-size: 18px;
      min-width: 36px;
      min-height: 36px;
      padding: 6px 8px;
    }
    .btn-play {
      width: 48px;
      height: 48px;
      font-size: 26px;
    }
    .btn-skip svg {
      width: 22px;
      height: 22px;
    }
    .time-current,
    .time-duration {
      font-size: 10px;
      min-width: 35px;
    }
    .download-info {
      font-size: 10px;
      top: 60px;
      right: 10px;
      padding: 4px 10px;
    }
  }

  :-webkit-full-screen .controls {
    padding-bottom: 40px;
  }
  :-moz-full-screen .controls {
    padding-bottom: 40px;
  }
  :fullscreen .controls {
    padding-bottom: 40px;
  }
</style>
</head>
<body>

<div class="player-container" id="container">
  
  <video 
    id="player" 
    controls 
    autoplay 
    playsinline
    preload="metadata"
    crossorigin="anonymous"
  ></video>

  <div class="download-info">
    <span class="label">📥</span> <span id="downloadSize">0 B</span>
  </div>

  <div class="center-status" id="centerStatus">
    <div class="spinner"></div>
    <div class="loading-text">در حال بارگذاری...</div>
  </div>

  <div class="topbar" id="topbar">
    <a href="/movies.html">‹ برگشت</a>
    <div class="film-name" id="filmName">فیلم</div>
  </div>

  <div class="controls" id="controls">
    <div class="progress-container">
      <span class="time-current" id="timeCurrent">00:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-buffer" id="progressBuffer"></div>
        <div class="progress-fill" id="progressFill">
          <span class="progress-dot"></span>
        </div>
      </div>
      <span class="time-duration" id="timeDuration">00:00</span>
    </div>

    <div class="buttons">
      <button class="btn btn-skip" id="btnSkipBack" title="۱۰ ثانیه عقب">
        <svg viewBox="0 0 24 24">
          <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
        </svg>
      </button>

      <button class="btn btn-play" id="btnPlay">▶</button>

      <button class="btn btn-skip" id="btnSkipForward" title="۱۰ ثانیه جلو">
        <svg viewBox="0 0 24 24">
          <path d="M13 18V6l8.5 6-8.5 6zm-.5-6l-8.5-6v12l8.5-6z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="error-overlay" id="errorOverlay">
    <h3>⚠️ خطا در پخش</h3>
    <p id="errorText">مشکلی در پخش فیلم پیش آمد.</p>
    <button class="btn-retry" id="btnRetry">🔄 تلاش مجدد</button>
    <a href="/movies.html">← برگشت به لیست فیلم‌ها</a>
  </div>

</div>

<script>
// ============================================================
// 🎬 PLAYER با نمایش حجم دانلود
// ============================================================

const video = document.getElementById('player');
const container = document.getElementById('container');

const controls = document.getElementById('controls');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const progressBuffer = document.getElementById('progressBuffer');
const timeCurrent = document.getElementById('timeCurrent');
const timeDuration = document.getElementById('timeDuration');
const btnPlay = document.getElementById('btnPlay');
const btnSkipBack = document.getElementById('btnSkipBack');
const btnSkipForward = document.getElementById('btnSkipForward');
const centerStatus = document.getElementById('centerStatus');
const errorOverlay = document.getElementById('errorOverlay');
const errorText = document.getElementById('errorText');
const btnRetry = document.getElementById('btnRetry');
const filmName = document.getElementById('filmName');
const downloadSize = document.getElementById('downloadSize');

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (!id) {
  showError('لینک فیلم ناقص است.');
}

filmName.textContent = decodeURIComponent(id || 'فیلم');

const SKIP_SECONDS = 10;
let controlsTimeout = null;
let isControlsVisible = false;
let retryCount = 0;
const MAX_RETRY = 3;
let totalBytes = 0;

// ============================================================
// 🎯 بارگذاری فیلم
// ============================================================
function loadVideo() {
  video.src = `/api/stream/${encodeURIComponent(id)}`;
  video.load();
  video.play();
  centerStatus.classList.remove('hidden');
}

loadVideo();

// ============================================================
// ⏱️ تبدیل زمان
// ============================================================
function formatTime(seconds) {
  if (isNaN(seconds) || seconds < 0) return '00:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// ============================================================
// 📊 محاسبه کل حجم بافر شده (همه بخش‌ها)
// ============================================================
function getTotalBuffered() {
  let total = 0;
  for (let i = 0; i < video.buffered.length; i++) {
    const start = video.buffered.start(i);
    const end = video.buffered.end(i);
    total += (end - start);
  }
  return total;
}

// ============================================================
// 📊 نمایش حجم دانلود با فرمت بهتر
// ============================================================
function formatSize(bytes) {
  if (bytes < 1024) {
    return bytes + ' B';
  } else if (bytes < 1024 * 1024) {
    return (bytes / 1024).toFixed(1) + ' KB';
  } else if (bytes < 1024 * 1024 * 1024) {
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  } else {
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
  }
}

// ============================================================
// 📊 آپدیت نوار پیشرفت و حجم دانلود
// ============================================================
function updateProgress() {
  if (!video.duration) return;
  
  const percent = (video.currentTime / video.duration) * 100;
  progressFill.style.width = percent + '%';
  timeCurrent.textContent = formatTime(video.currentTime);
  timeDuration.textContent = formatTime(video.duration);

  if (video.buffered.length > 0) {
    // 🔥 محاسبه کل حجم دانلود شده (همه بخش‌ها)
    const totalBuffered = getTotalBuffered();
    const bufferPercent = (totalBuffered / video.duration) * 100;
    progressBuffer.style.width = bufferPercent + '%';
    
    // 🔥 نمایش حجم کل دانلود شده
    totalBytes = Math.max(totalBytes, totalBuffered);
    downloadSize.textContent = formatSize(totalBytes);
  }
}

video.addEventListener('timeupdate', updateProgress);
video.addEventListener('progress', updateProgress);

// ============================================================
// ▶️ دکمه پخش/توقف
// ============================================================
function togglePlay() {
  if (video.paused) {
    video.play();
    btnPlay.textContent = '⏸';
  } else {
    video.pause();
    btnPlay.textContent = '▶';
  }
}

btnPlay.addEventListener('click', togglePlay);

video.addEventListener('play', () => {
  btnPlay.textContent = '⏸';
  centerStatus.classList.add('hidden');
});

video.addEventListener('pause', () => {
  btnPlay.textContent = '▶';
});

// ============================================================
// ⏪ ⏩ دکمه‌های ۱۰ ثانیه
// ============================================================
btnSkipBack.addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - SKIP_SECONDS);
});

btnSkipForward.addEventListener('click', () => {
  video.currentTime = Math.min(video.duration, video.currentTime + SKIP_SECONDS);
});

// ============================================================
// 📍 کلیک روی نوار پیشرفت
// ============================================================
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  video.currentTime = x * video.duration;
});

// ============================================================
// 🎮 نمایش/مخفی کردن کنترل‌ها
// ============================================================
function showControls() {
  controls.classList.add('visible');
  isControlsVisible = true;
  clearTimeout(controlsTimeout);
  controlsTimeout = setTimeout(() => {
    hideControls();
  }, 4000);
}

function hideControls() {
  if (centerStatus.classList.contains('hidden')) {
    controls.classList.remove('visible');
    isControlsVisible = false;
  }
}

container.addEventListener('click', (e) => {
  if (e.target.closest('.controls') || e.target.closest('.topbar')) return;
  if (errorOverlay.classList.contains('show')) return;
  
  if (isControlsVisible) {
    hideControls();
  } else {
    showControls();
  }
});

container.addEventListener('mousemove', () => {
  if (!errorOverlay.classList.contains('show')) {
    showControls();
  }
});

container.addEventListener('touchstart', () => {
  if (!errorOverlay.classList.contains('show')) {
    showControls();
  }
});

setTimeout(showControls, 1000);

// ============================================================
// 🔄 مدیریت بافر
// ============================================================
video.addEventListener('waiting', () => {
  centerStatus.classList.remove('hidden');
  centerStatus.querySelector('.loading-text').textContent = 'در حال بارگیری ...';
});

video.addEventListener('canplay', () => {
  centerStatus.classList.add('hidden');
});

video.addEventListener('playing', () => {
  centerStatus.classList.add('hidden');
});

// ============================================================
// ❌ مدیریت خطا
// ============================================================
function showError(msg) {
  errorOverlay.classList.add('show');
  errorText.textContent = msg || 'مشکلی در پخش فیلم پیش آمد.';
  controls.classList.remove('visible');
  centerStatus.classList.add('hidden');
}

function hideError() {
  errorOverlay.classList.remove('show');
}

btnRetry.addEventListener('click', () => {
  hideError();
  retryCount = 0;
  totalBytes = 0;
  downloadSize.textContent = '0 B';
  loadVideo();
});

video.addEventListener('error', (e) => {
  console.error('Video error:', e);
  
  const errorCode = video.error?.code;
  
  if (errorCode === 2 && retryCount < MAX_RETRY) {
    retryCount++;
    console.log(`🔄 تلاش مجدد ${retryCount}/${MAX_RETRY}...`);
    centerStatus.classList.remove('hidden');
    centerStatus.querySelector('.loading-text').textContent = `🔄 تلاش مجدد (${retryCount}/${MAX_RETRY})...`;
    
    setTimeout(() => {
      video.load();
      video.play();
    }, 2000);
    return;
  }
  
  showError('این فیلم پیدا نشد یا پخشش با مشکل مواجه شد.');
});

video.addEventListener('stalled', () => {
  console.log('⚠️ پخش متوقف شد، تلاش مجدد...');
  if (!video.paused) {
    video.play();
  }
});

// ============================================================
// ⌨️ کیبورد شورت‌کات
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  switch(e.key) {
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowRight':
      e.preventDefault();
      video.currentTime = Math.min(video.duration, video.currentTime + 10);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      video.currentTime = Math.max(0, video.currentTime - 10);
      break;
    case 'f':
    case 'F':
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        container.requestFullscreen?.();
      }
      break;
  }
});

// ============================================================
// 🖥️ دابل کلیک تمام صفحه
// ============================================================
video.addEventListener('dblclick', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    container.requestFullscreen?.();
  }
});

console.log('🎬 Player loaded successfully!');
console.log(`📺 Film: ${id}`);
</script>

</body>
</html>
