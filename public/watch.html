<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>پخش فیلم</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08090b;
    --gold: #e0a94a;
    --text: #f3efe6;
    --text-muted: #9a988f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    font-family: "Vazirmatn", Tahoma, sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  .topbar {
    position: absolute;
    top: 0;
    right: 0;
    left: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
    z-index: 5;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .topbar a, .topbar .name { pointer-events: auto; }

  .topbar.hidden { opacity: 0; }

  .back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    text-decoration: none;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
  }
  .back:hover { background: rgba(255,255,255,0.15); }

  .name {
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .center-msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 20px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid rgba(224,169,74,0.2);
    border-top-color: var(--gold);
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    color: var(--text);
    font-size: 15px;
    max-width: 320px;
    line-height: 1.8;
  }

  .error-box a {
    display: inline-block;
    margin-top: 14px;
    color: #14120a;
    background: var(--gold);
    padding: 10px 20px;
    border-radius: 9px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation-duration: 1.6s; }
  }
</style>
</head>
<body>

<div class="stage">
  <video id="player" controls autoplay playsinline></video>

  <div class="topbar" id="topbar">
    <a class="back" href="/movies.html" aria-label="بازگشت به لیست فیلم‌ها">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <span class="name" id="title"></span>
  </div>

  <div class="center-msg" id="status">
    <div class="spinner"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const video = document.getElementById("player");
  const statusEl = document.getElementById("status");
  const topbar = document.getElementById("topbar");
  const titleEl = document.getElementById("title");

  if (!id) {
    showError("لینک ناقصه.");
  } else {
    titleEl.textContent = decodeURIComponent(id);
    video.src = "/api/stream/" + encodeURIComponent(id);

    video.addEventListener("loadeddata", () => { statusEl.style.display = "none"; });
    video.addEventListener("playing", () => { statusEl.style.display = "none"; });
    video.addEventListener("waiting", () => { statusEl.innerHTML = '<div class="spinner"></div>'; statusEl.style.display = "flex"; });
    video.addEventListener("error", () => {
      showError("این فیلم پیدا نشد یا پخشش با مشکل مواجه شد.");
    });
  }

  function showError(msg) {
    statusEl.style.display = "flex";
    statusEl.innerHTML =
      '<div class="error-box">' + msg + '<br><a href="/movies.html">برگشت به لیست فیلم‌ها</a></div>';
  }

  let hideTimer;
  function showTopbar() {
    topbar.classList.remove("hidden");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => topbar.classList.add("hidden"), 2800);
  }
  document.addEventListener("mousemove", showTopbar);
  document.addEventListener("touchstart", showTopbar);
  showTopbar();
</script>

</body>
</html>
