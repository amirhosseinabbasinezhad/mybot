<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مدیریت متن‌ها</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0c10;
    --bg-soft: #131419;
    --card: #191a20;
    --card-hover: #212229;
    --gold: #e0a94a;
    --gold-dim: #8a6a34;
    --text: #f3efe6;
    --text-muted: #8d8b86;
    --border: #26272e;
    --red: #e74c3c;
    --green: #2ecc71;
    --blue: #3498db;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(1100px 500px at 20% -10%, rgba(224, 169, 74, 0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(122, 38, 52, 0.10), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Vazirmatn", Tahoma, sans-serif;
    padding: 28px 20px 60px;
  }

  header {
    max-width: 720px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(155deg, var(--gold), var(--gold-dim));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: #14120a;
    font-size: 16px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 21px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .count {
    font-size: 13px;
    color: var(--text-muted);
  }

  .btn-back {
    color: var(--gold);
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-back:hover {
    opacity: 0.8;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
  }

  .add-section {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
  }

  .add-section input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-soft);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-section input:focus {
    border-color: var(--gold-dim);
  }

  .add-section input::placeholder {
    color: var(--text-muted);
  }

  .btn-add {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    background: var(--gold);
    color: #14120a;
    font-weight: 600;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-add:hover {
    background: #f0b95a;
  }

  .btn-add:active {
    transform: scale(0.97);
  }

  .text-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 10px;
  }

  .text-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .text-item:hover {
    background: var(--card-hover);
    border-color: var(--gold-dim);
  }

  .text-content {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    color: var(--text);
    direction: ltr;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .text-content .preview {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .text-content .btn-more {
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.2s;
    font-family: inherit;
    flex-shrink: 0;
  }

  .text-content .btn-more:hover {
    background: rgba(224,169,74,0.15);
  }

  .text-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .text-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .text-actions button:hover {
    background: rgba(255,255,255,0.05);
  }

  .text-actions .btn-edit:hover {
    color: var(--blue);
  }

  .text-actions .btn-copy:hover {
    color: var(--green);
  }

  .text-actions .btn-delete:hover {
    color: var(--red);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty svg {
    opacity: 0.35;
    margin-bottom: 14px;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid rgba(224,169,74,0.15);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== Modal (پاپ‌آپ) ===== */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal-box {
    max-width: 560px;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    position: relative;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-box .modal-title {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-box .modal-title .btn-close-modal {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .modal-box .modal-title .btn-close-modal:hover {
    background: rgba(255,255,255,0.05);
  }

  .modal-box .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    font-size: 15px;
    color: var(--text);
    line-height: 1.8;
    word-break: break-all;
    direction: ltr;
    text-align: left;
    white-space: pre-wrap;
    max-height: 400px;
  }

  .modal-box .modal-body::-webkit-scrollbar {
    width: 6px;
  }

  .modal-box .modal-body::-webkit-scrollbar-track {
    background: var(--bg-soft);
    border-radius: 3px;
  }

  .modal-box .modal-body::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .modal-box .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    justify-content: flex-end;
  }

  .modal-box .modal-footer button {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: background 0.2s;
  }

  .modal-box .modal-footer .btn-copy-modal {
    background: var(--green);
    color: #fff;
  }

  .modal-box .modal-footer .btn-copy-modal:hover {
    background: #27ae60;
  }

  .modal-box .modal-footer .btn-close-modal-footer {
    background: var(--border);
    color: var(--text);
  }

  .modal-box .modal-footer .btn-close-modal-footer:hover {
    background: #333;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.9);
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    border: 1px solid var(--border);
  }

  .toast.show {
    opacity: 1;
  }

  .toast.success {
    border-color: var(--green);
  }

  .toast.error {
    border-color: var(--red);
  }

  @media (max-width: 600px) {
    .add-section {
      flex-direction: column;
    }
    .text-content {
      font-size: 13px;
    }
    .text-actions button {
      padding: 4px 6px;
      font-size: 12px;
    }
    .modal-box {
      padding: 20px;
      margin: 10px;
    }
    .modal-box .modal-body {
      font-size: 14px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">📝</div>
    <h1>متن‌ها</h1>
  </div>
  <a class="btn-back" href="/movies.html">‹ برگشت به فیلم‌ها</a>
</header>

<main>
  <div class="add-section">
    <input type="text" id="inputText" placeholder="متن جدید را وارد کنید..." />
    <button class="btn-add" id="btnAdd">➕ افزودن</button>
  </div>

  <ul class="text-list" id="textList">
    <div class="loading">
      <div class="spinner"></div>
      در حال بارگذاری...
    </div>
  </ul>
</main>

<!-- ===== Modal (پاپ‌آپ) ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title">
      <span>📄 متن کامل</span>
      <button class="btn-close-modal" id="modalCloseBtn">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-copy-modal" id="modalCopyBtn">📋 کپی متن</button>
      <button class="btn-close-modal-footer" id="modalCloseFooter">بستن</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
const API_URL = '/api/texts';
const textList = document.getElementById('textList');
const inputText = document.getElementById('inputText');
const btnAdd = document.getElementById('btnAdd');
const toast = document.getElementById('toast');

// المان‌های مودال
const modalOverlay = document.getElementById('modalOverlay');
const modalBody = document.getElementById('modalBody');
const modalCopyBtn = document.getElementById('modalCopyBtn');
const modalCloseBtn = document.getElementById('modalCloseBtn');
const modalCloseFooter = document.getElementById('modalCloseFooter');

let allTexts = [];
let currentModalText = '';

// ============================================================
// 📊 Toast
// ============================================================
function showToast(message, type = 'success') {
  toast.textContent = message;
  toast.className = 'toast show ' + type;
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// ============================================================
// 📥 دریافت متن‌ها
// ============================================================
async function loadTexts() {
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('خطا در دریافت متن‌ها');
    allTexts = await response.json();
    renderTexts();
  } catch (err) {
    console.error('❌ Error loading texts:', err);
    textList.innerHTML = `
      <li class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>خطا در بارگذاری متن‌ها</div>
      </li>
    `;
  }
}

// ============================================================
// 🖼️ رندر متن‌ها (فقط ۱۰ کاراکتر اول)
// ============================================================
function renderTexts() {
  if (allTexts.length === 0) {
    textList.innerHTML = `
      <li class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>هنوز متنی اضافه نشده است.</div>
      </li>
    `;
    return;
  }

  textList.innerHTML = allTexts.map(item => {
    const fullText = item.text;
    const previewText = fullText.length > 10 ? fullText.substring(0, 10) + '...' : fullText;
    const needsMore = fullText.length > 10;

    return `
      <li class="text-item" data-id="${item._id}">
        <span class="text-content">
          <span class="preview">${escapeHtml(previewText)}</span>
          ${needsMore ? `<button class="btn-more" onclick="showFullText('${item._id}')">بیشتر</button>` : ''}
        </span>
        <div class="text-actions">
          <button class="btn-edit" onclick="editText('${item._id}')" title="ویرایش">✏️</button>
          <button class="btn-copy" onclick="copyText('${item._id}')" title="کپی">📋</button>
          <button class="btn-delete" onclick="deleteText('${item._id}')" title="حذف">🗑️</button>
        </div>
      </li>
    `;
  }).join('');
}

// ============================================================
// 🔍 نمایش متن کامل در مودال
// ============================================================
function showFullText(id) {
  const item = allTexts.find(t => t._id === id);
  if (!item) return;

  currentModalText = item.text;
  modalBody.textContent = item.text;
  modalOverlay.classList.add('show');
}

// ============================================================
// 📋 کپی از مودال
// ============================================================
modalCopyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(currentModalText)
    .then(() => {
      showToast('✅ متن کامل کپی شد');
    })
    .catch(() => {
      // Fallback
      const textarea = document.createElement('textarea');
      textarea.value = currentModalText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('✅ متن کامل کپی شد');
    });
});

// ============================================================
// ❌ بستن مودال
// ============================================================
function closeModal() {
  modalOverlay.classList.remove('show');
}

modalCloseBtn.addEventListener('click', closeModal);
modalCloseFooter.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// کلید Escape برای بستن مودال
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// 🛠 Escape HTML
// ============================================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
// ➕ افزودن متن
// ============================================================
async function addText() {
  const text = inputText.value.trim();
  if (!text) {
    showToast('لطفاً متن را وارد کنید', 'error');
    return;
  }

  btnAdd.disabled = true;
  btnAdd.textContent = '⏳';

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });

    if (!response.ok) throw new Error('خطا در افزودن متن');

    const result = await response.json();
    allTexts.unshift(result);
    renderTexts();
    inputText.value = '';
    showToast('✅ متن با موفقیت اضافه شد');
  } catch (err) {
    console.error('❌ Error adding text:', err);
    showToast('❌ خطا در افزودن متن', 'error');
  } finally {
    btnAdd.disabled = false;
    btnAdd.textContent = '➕ افزودن';
  }
}

btnAdd.addEventListener('click', addText);
inputText.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') addText();
});

// ============================================================
// ✏️ ویرایش متن
// ============================================================
function editText(id) {
  const item = allTexts.find(t => t._id === id);
  if (!item) return;

  const newText = prompt('متن جدید را وارد کنید:', item.text);
  if (newText === null) return;
  if (!newText.trim()) {
    showToast('متن نمی‌تواند خالی باشد', 'error');
    return;
  }

  fetch(API_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, text: newText.trim() }),
  })
    .then(res => {
      if (!res.ok) throw new Error('خطا در ویرایش');
      return res.json();
    })
    .then(() => {
      item.text = newText.trim();
      renderTexts();
      showToast('✅ متن ویرایش شد');
    })
    .catch(err => {
      console.error('❌ Error editing text:', err);
      showToast('❌ خطا در ویرایش متن', 'error');
    });
}

// ============================================================
// 📋 کپی متن (کل متن)
// ============================================================
function copyText(id) {
  const item = allTexts.find(t => t._id === id);
  if (!item) return;

  navigator.clipboard.writeText(item.text)
    .then(() => {
      showToast('✅ متن کامل کپی شد');
    })
    .catch(() => {
      const textarea = document.createElement('textarea');
      textarea.value = item.text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('✅ متن کامل کپی شد');
    });
}

// ============================================================
// 🗑️ حذف متن
// ============================================================
function deleteText(id) {
  if (!confirm('آیا مطمئن هستید؟')) return;

  fetch(`${API_URL}?id=${id}`, {
    method: 'DELETE',
  })
    .then(res => {
      if (!res.ok) throw new Error('خطا در حذف');
      return res.json();
    })
    .then(() => {
      allTexts = allTexts.filter(t => t._id !== id);
      renderTexts();
      showToast('✅ متن حذف شد');
    })
    .catch(err => {
      console.error('❌ Error deleting text:', err);
      showToast('❌ خطا در حذف متن', 'error');
    });
}

// ============================================================
// 🚀 بارگذاری اولیه
// ============================================================
loadTexts();
</script>

</body>
</html>
